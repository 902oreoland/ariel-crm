<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ariel Wong Photography — CRM</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;color:#1a1a1a}.app{max-width:1100px;margin:0 auto;padding:1rem}.topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding:0.75rem 1rem;background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1)}.logo{font-size:15px;font-weight:500;flex:1}.nav{display:flex;gap:6px}.nav button{padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:transparent;cursor:pointer;font-size:13px;color:#666}.nav button.active{background:#f0f0f0;color:#1a1a1a;font-weight:500}.panel{display:none}.panel.active{display:block}.card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:1.25rem;margin-bottom:1rem}.section-title{font-size:12px;font-weight:500;color:#888;margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.5px}.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}.badge-confirmed{background:#e1f5ee;color:#0f6e56}.badge-pending{background:#faeeda;color:#854f0b}.badge-delivered{background:#eaf3de;color:#3b6d11}.badge-todo{background:#eeedfe;color:#3c3489}.connect-box{background:#f9f9f7;border-radius:12px;padding:3rem;text-align:center;border:0.5px solid rgba(0,0,0,0.08)}.connect-box h2{font-size:20px;font-weight:500;margin-bottom:8px}.connect-box p{font-size:14px;color:#666;margin-bottom:1.5rem}.btn-primary{background:#1a1a1a;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}.btn-secondary{background:transparent;border:0.5px solid rgba(0,0,0,0.2);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:#1a1a1a}.client-table{width:100%;border-collapse:collapse;font-size:13px}.client-table th{text-align:left;padding:8px 12px;color:#888;font-weight:500;border-bottom:0.5px solid rgba(0,0,0,0.08);font-size:11px;text-transform:uppercase;letter-spacing:0.3px}.client-table td{padding:11px 12px;border-bottom:0.5px solid rgba(0,0,0,0.06);color:#1a1a1a;vertical-align:middle}.client-table tr:last-child td{border-bottom:none}.client-table tbody tr:hover td{background:#fafaf8;cursor:pointer}.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;padding:1rem}.modal-overlay.open{display:flex}.modal-card{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);font-size:13px}.detail-row:last-child{border-bottom:none}.detail-label{color:#888;flex:1}.detail-val{color:#1a1a1a;flex:2;text-align:right}.checklist{display:flex;flex-direction:column;gap:6px;margin-top:8px}.check-item{display:flex;align-items:center;gap:10px;font-size:13px;padding:9px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.1);cursor:pointer}.check-item:hover{background:#f9f9f7}.check-item.done{color:#aaa}.check-circle{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}.check-circle.ticked{background:#1d9e75;border-color:#1d9e75;color:#fff}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}.cal-head{font-size:11px;color:#888;text-align:center;padding:6px;font-weight:500}.cal-day{min-height:56px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.07);padding:5px 6px;font-size:11px;color:#888;background:#fff}.cal-day.has-event{background:#e1f5ee;border-color:#9fe1cb;cursor:pointer}.cal-day.today{border-color:#7f77dd;border-width:1.5px}.cal-day .day-num{font-size:11px;margin-bottom:2px;font-weight:500;color:#1a1a1a}.cal-dot{font-size:10px;color:#0f6e56;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}.cal-month-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem}.cal-month-nav button{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px}.cal-title{font-size:15px;font-weight:500;flex:1}.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.08);margin-bottom:8px}.task-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}.task-icon.urgent{background:#faece7;color:#d85a30}.task-icon.normal{background:#eeedfe;color:#534ab7}.task-text{font-size:13px;font-weight:500;margin-bottom:2px}.task-sub{font-size:12px;color:#888}.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}.stat{background:#f5f4f0;border-radius:8px;padding:1rem;text-align:center}.stat-num{font-size:26px;font-weight:500}.stat-label{font-size:11px;color:#888;margin-top:4px}.empty{color:#aaa;font-size:13px;padding:1.5rem 0;text-align:center}</style></head><body><div class="app" id="app" style="display:none"><div class="topbar"><span class="logo">Ariel Wong Photography</span><div class="nav"><button class="active" onclick="showPanel('dashboard',this)">Dashboard</button><button onclick="showPanel('clients',this)">Clients</button><button onclick="showPanel('calendar',this)">Calendar</button></div><button class="btn-secondary" onclick="refreshData()" id="refresh-btn" style="margin-left:8px;font-size:12px">Refresh</button></div><div id="panel-dashboard" class="panel active"><div class="stat-grid" id="stats"></div><div class="card"><div class="section-title">Next actions</div><div id="tasks"></div></div></div><div id="panel-clients" class="panel"><div class="card" style="padding:0;overflow:hidden"><table class="client-table"><thead><tr><th>Couple</th><th>Wedding date</th><th>Package</th><th>Contract</th><th>Gallery</th><th>Status</th></tr></thead><tbody id="client-rows"></tbody></table></div></div><div id="panel-calendar" class="panel"><div class="card"><div class="cal-month-nav"><button onclick="changeMonth(-1)">&#8592;</button><span class="cal-title" id="cal-title"></span><button onclick="changeMonth(1)">&#8594;</button></div><div class="cal-grid" id="cal-heads"></div><div class="cal-grid" id="cal-days" style="margin-top:3px"></div></div></div></div><div id="connect-screen" class="app"><div class="card connect-box"><h2>Ariel Wong Photography CRM</h2><p>Sign in with your Google account to load your client data.</p><button class="btn-primary" onclick="startAuth()">Connect Google Sheets</button><p style="margin-top:12px;font-size:12px;color:#aaa">Uses your Ariel Google account.</p></div></div><div class="modal-overlay" id="detail-modal"><div class="modal-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><span style="font-size:15px;font-weight:500" id="detail-name"></span><button class="btn-secondary" onclick="closeDetail()">Close</button></div><div id="detail-body"></div><div style="margin-top:1.25rem"><div class="section-title" style="margin-bottom:8px">Checklist</div><div class="checklist" id="detail-checks"></div></div></div></div><script>const CLIENT_ID='232091039776-mshrclmt0ovtc788o6179opjc7vg3ikl.apps.googleusercontent.com';const SHEET_ID='1_iLx-PUStJESC3CRN7b0Sob9n2h5WwIGcKsTtwi-53M';const SCOPES='https://www.googleapis.com/auth/spreadsheets';const RANGE='Sheet1!A1:U200';let clients=[],token=null,calYear=new Date().getFullYear(),calMonth=new Date().getMonth();function showPanel(name,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.getElementById('panel-'+name).classList.add('active');btn.classList.add('active');if(name==='calendar')renderCalendar();}function startAuth(){const url='https://accounts.google.com/o/oauth2/v2/auth?client_id='+CLIENT_ID+'&redirect_uri='+encodeURIComponent(window.location.origin+window.location.pathname)+'&response_type=token&scope='+encodeURIComponent(SCOPES)+'&prompt=select_account';window.location.href=url;}function getTokenFromHash(){const p=new URLSearchParams(window.location.hash.substring(1));return p.get('access_token');}async function loadSheet(){const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+RANGE,{headers:{Authorization:'Bearer '+token}});const d=await r.json();const rows=d.values||[];if(rows.length<2){clients=[];return;}const h=rows[0];clients=rows.slice(1).map((row,i)=>{const o={};h.forEach((k,j)=>o[k]=row[j]||'');o._row=i+2;return o;});}async function refreshData(){document.getElementById('refresh-btn').textContent='Loading...';await loadSheet();renderAll();document.getElementById('refresh-btn').textContent='Refresh';}function renderAll(){renderStats();renderTasks();renderClients();}function renderStats(){const now=new Date();const total=clients.length;const upcoming=clients.filter(c=>new Date(c['Wedding Date'])>now).length;const undelivered=clients.filter(c=>c['Gallery Delivered']!=='TRUE'&&c['Status']==='Confirmed').length;document.getElementById('stats').innerHTML='<div class="stat"><div class="stat-num">'+total+'</div><div class="stat-label">Clients</div></div><div class="stat"><div class="stat-num">'+upcoming+'</div><div class="stat-label">Upcoming</div></div><div class="stat"><div class="stat-num">'+undelivered+'</div><div class="stat-label">To deliver</div></div>';}function renderTasks(){const tasks=[];const now=new Date();clients.forEach(c=>{const d=new Date(c['Wedding Date']);const days=Math.ceil((d-now)/(1000*60*60*24));const n=c['Groom Name']+' & '+c['Bride Name'];if(c['Contract Sent']!=='TRUE')tasks.push({icon:'urgent',sym:'!',text:'Send contract',sub:n,p:1});if(c['Contract Sent']==='TRUE'&&c['Contract Signed']!=='TRUE')tasks.push({icon:'urgent',sym:'!',text:'Awaiting signed contract',sub:n,p:2});if(days>0&&days<=30)tasks.push({icon:'normal',sym:'★',text:'Wedding in '+days+' days',sub:n+' — '+c['Wedding Date'],p:3});if(c['Gallery Delivered']!=='TRUE'&&d<now)tasks.push({icon:'urgent',sym:'!',text:'Gallery not yet delivered',sub:n,p:1});});tasks.sort((a,b)=>a.p-b.p);document.getElementById('tasks').innerHTML=tasks.length?tasks.map(t=>'<div class="task-item"><div class="task-icon '+t.icon+'">'+t.sym+'</div><div><div class="task-text">'+t.text+'</div><div class="task-sub">'+t.sub+'</div></div></div>').join(''):'<div class="empty">All caught up.</div>';}function renderClients(){const tbody=document.getElementById('client-rows');if(!clients.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:#aaa">No clients yet</td></tr>';return;}tbody.innerHTML=clients.map((c,i)=>{const cb=c['Contract Signed']==='TRUE'?'<span class="badge badge-confirmed">Signed</span>':c['Contract Sent']==='TRUE'?'<span class="badge badge-pending">Sent</span>':'<span class="badge badge-todo">Not sent</span>';const gb=c['Gallery Delivered']==='TRUE'?'<span class="badge badge-delivered">Delivered</span>':'<span class="badge badge-todo">Pending</span>';const sb='<span class="badge badge-'+(c['Status']||'todo').toLowerCase()+'">'+c['Status']+'</span>';return '<tr onclick="openDetail('+i+')"><td style="font-weight:500">'+c['Groom Name']+' &amp; '+c['Bride Name']+'</td><td>'+c['Wedding Date']+'</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c['Package']+'</td><td>'+cb+'</td><td>'+gb+'</td><td>'+sb+'</td></tr>';}).join('');}function openDetail(i){const c=clients[i];document.getElementById('detail-name').textContent=c['Groom Name']+' & '+c['Bride Name'];const fields=[['Wedding date',c['Wedding Date']],['Package',c['Package']],['Time',c['Start Time']+' — '+c['End Time']],['Prep venue',c['Venue Prep']],['Ceremony',c['Venue Ceremony']],['Reception',c['Venue Reception']],['Groom phone',c['Groom Phone']],['Bride phone',c['Bride Phone']],['Email',c['Groom Email']],['Add-ons',c['Add-ons']],['Notes',c['Notes']]];document.getElementById('detail-body').innerHTML=fields.filter(f=>f[1]).map(f=>'<div class="detail-row"><span class="detail-label">'+f[0]+'</span><span class="detail-val">'+f[1]+'</span></div>').join('');const checks=[{key:'Contract Sent',label:'Contract sent'},{key:'Contract Signed',label:'Contract signed'},{key:'Deposit Paid',label:'Deposit paid'},{key:'Gallery Delivered',label:'Gallery delivered'}];document.getElementById('detail-checks').innerHTML=checks.map(ch=>{const done=c[ch.key]==='TRUE';return '<div class="check-item'+(done?' done':'')+'" onclick="toggleCheck('+i+',''+ch.key+'',this)"><div class="check-circle'+(done?' ticked':'')+'">'+( done?'&#10003;':'')+'</div><span>'+ch.label+'</span></div>';}).join('');document.getElementById('detail-modal').classList.add('open');}async function toggleCheck(idx,field,el){const c=clients[idx];const v=c[field]==='TRUE'?'FALSE':'TRUE';c[field]=v;const headers=Object.keys(clients[0]).filter(k=>k!=='_row');const col=headers.indexOf(field);const colL=String.fromCharCode(65+col);await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/Sheet1!'+colL+c._row+'?valueInputOption=RAW',{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({values:[[v]]})});openDetail(idx);renderTasks();renderStats();}function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}function renderCalendar(){const months=['January','February','March','April','May','June','July','August','September','October','November','December'];const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];document.getElementById('cal-title').textContent=months[calMonth]+' '+calYear;document.getElementById('cal-heads').innerHTML=days.map(d=>'<div class="cal-head">'+d+'</div>').join('');const first=new Date(calYear,calMonth,1).getDay();const dim=new Date(calYear,calMonth+1,0).getDate();const today=new Date();const em={};clients.forEach(c=>{if(!c['Wedding Date'])return;const d=new Date(c['Wedding Date']);if(d.getFullYear()===calYear&&d.getMonth()===calMonth){const day=d.getDate();em[day]=(em[day]||[]).concat(c['Groom Name']+' & '+c['Bride Name']);}});let h='';for(let i=0;i<first;i++)h+='<div style="background:transparent;border:none"></div>';for(let d=1;d<=dim;d++){const isT=today.getDate()===d&&today.getMonth()===calMonth&&today.getFullYear()===calYear;const ev=em[d];h+='<div class="cal-day'+(ev?' has-event':'')+(isT?' today':'')+'"><div class="day-num">'+d+'</div>'+(ev?ev.map(n=>'<div class="cal-dot">'+n+'</div>').join(''):'')+'</div>';}document.getElementById('cal-days').innerHTML=h;}function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}async function init(){token=getTokenFromHash();if(token){history.replaceState(null,null,window.location.pathname);sessionStorage.setItem('crm_token',token);}else token=sessionStorage.getItem('crm_token');if(token){document.getElementById('connect-screen').style.display='none';document.getElementById('app').style.display='block';await loadSheet();renderAll();renderCalendar();}};init();</script></body></html>
