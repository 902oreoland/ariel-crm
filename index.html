<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ariel Wong Photography — CRM</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;color:#1a1a1a}.app{max-width:1100px;margin:0 auto;padding:1rem}.topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding:.75rem 1rem;background:#fff;border-radius:12px;border:.5px solid rgba(0,0,0,.1)}.logo{font-size:15px;font-weight:500;flex:1}.nav{display:flex;gap:6px}.nav button{padding:6px 14px;border-radius:8px;border:.5px solid rgba(0,0,0,.2);background:transparent;cursor:pointer;font-size:13px;color:#666}.nav button.active{background:#f0f0f0;color:#1a1a1a;font-weight:500}.panel{display:none}.panel.active{display:block}.card{background:#fff;border-radius:12px;border:.5px solid rgba(0,0,0,.1);padding:1.25rem;margin-bottom:1rem}.sec{font-size:12px;font-weight:500;color:#888;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px}.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}.bc{background:#e1f5ee;color:#0f6e56}.bp{background:#faeeda;color:#854f0b}.bd{background:#eaf3de;color:#3b6d11}.bt{background:#eeedfe;color:#3c3489}.loading{text-align:center;padding:3rem;color:#888;font-size:14px}.btn-p{background:#1a1a1a;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}.btn-s{background:transparent;border:.5px solid rgba(0,0,0,.2);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:#1a1a1a}.ct{width:100%;border-collapse:collapse;font-size:13px}.ct th{text-align:left;padding:8px 12px;color:#888;font-weight:500;border-bottom:.5px solid rgba(0,0,0,.08);font-size:11px;text-transform:uppercase}.ct td{padding:11px 12px;border-bottom:.5px solid rgba(0,0,0,.06);color:#1a1a1a;vertical-align:middle}.ct tr:last-child td{border-bottom:none}.ct tbody tr:hover td{background:#fafaf8;cursor:pointer}.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;padding:1rem}.mo.open{display:flex}.mc{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}.dr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.06);font-size:13px}.dr:last-child{border-bottom:none}.dl{color:#888;flex:1}.dv{color:#1a1a1a;flex:2;text-align:right}.cl{display:flex;flex-direction:column;gap:6px;margin-top:8px}.ci{display:flex;align-items:center;gap:10px;font-size:13px;padding:9px 12px;border-radius:8px;border:.5px solid rgba(0,0,0,.1);cursor:pointer}.ci:hover{background:#f9f9f7}.ci.done{color:#aaa}.cc{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}.cc.tk{background:#1d9e75;border-color:#1d9e75;color:#fff}.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}.ch{font-size:11px;color:#888;text-align:center;padding:6px;font-weight:500}.cd{min-height:56px;border-radius:8px;border:.5px solid rgba(0,0,0,.07);padding:5px 6px;background:#fff}.cd.he{background:#e1f5ee;border-color:#9fe1cb}.cd.td{border-color:#7f77dd;border-width:1.5px}.dn{font-size:11px;margin-bottom:2px;font-weight:500;color:#1a1a1a}.dot{font-size:10px;color:#0f6e56;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cn{display:flex;align-items:center;gap:12px;margin-bottom:1rem}.cn button{background:#fff;border:.5px solid rgba(0,0,0,.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px}.ct2{font-size:15px;font-weight:500;flex:1}.ti{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:8px;border:.5px solid rgba(0,0,0,.08);margin-bottom:8px}.tib{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}.urg{background:#faece7;color:#d85a30}.nrm{background:#eeedfe;color:#534ab7}.tt{font-size:13px;font-weight:500;margin-bottom:2px}.ts{font-size:12px;color:#888}.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}.st{background:#f5f4f0;border-radius:8px;padding:1rem;text-align:center}.sn{font-size:26px;font-weight:500}.sl{font-size:11px;color:#888;margin-top:4px}.em{color:#aaa;font-size:13px;padding:1.5rem 0;text-align:center}</style></head><body>
<div class="app" id="app">
<div class="topbar"><span class="logo">Ariel Wong Photography</span><div class="nav"><button class="active" onclick="showPanel('dashboard',this)">Dashboard</button><button onclick="showPanel('clients',this)">Clients</button><button onclick="showPanel('calendar',this)">Calendar</button></div><button class="btn-s" onclick="refreshData()" id="rbtn" style="margin-left:8px;font-size:12px">Refresh</button></div>
<div id="panel-dashboard" class="panel active"><div class="sg" id="stats"></div><div class="card"><div class="sec">Next actions</div><div id="tasks"></div></div></div>
<div id="panel-clients" class="panel"><div class="card" style="padding:0;overflow:hidden"><table class="ct"><thead><tr><th>Couple</th><th>Wedding date</th><th>Package</th><th>Contract</th><th>Gallery</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table></div></div>
<div id="panel-calendar" class="panel"><div class="card"><div class="cn"><button onclick="cm(-1)">&#8592;</button><span class="ct2" id="ctitle"></span><button onclick="cm(1)">&#8594;</button></div><div class="cg" id="cheads"></div><div class="cg" id="cdays" style="margin-top:3px"></div></div></div>
</div>
<div class="mo" id="dmodal"><div class="mc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><span style="font-size:15px;font-weight:500" id="dname"></span><button class="btn-s" onclick="closeD()">Close</button></div><div id="dbody"></div><div style="margin-top:1.25rem"><div class="sec" style="margin-bottom:8px">Checklist</div><div class="cl" id="dchecks"></div></div></div></div>
<script>
const API='https://script.google.com/macros/s/AKfycbxUv_N8xrplkXMgaC443n2NGHKtVBkK4ILOB_Q87PkwSUwh2nVD6pKDJKw38wmLptk/exec';
let clients=[],cY=new Date().getFullYear(),cM=new Date().getMonth();

async function loadData(){
  document.getElementById('tasks').innerHTML='<div class="em">Loading...</div>';
  const r=await fetch(API+'?action=read');
  const d=await r.json();
  if(d.ok){clients=d.rows;renderAll();renderCal();}
  else{document.getElementById('tasks').innerHTML='<div class="em">Error loading data.</div>';}
}

async function refreshData(){
  document.getElementById('rbtn').textContent='Loading...';
  await loadData();
  document.getElementById('rbtn').textContent='Refresh';
}

function showPanel(n,b){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById('panel-'+n).classList.add('active');
  b.classList.add('active');
  if(n==='calendar')renderCal();
}

function renderAll(){renderStats();renderTasks();renderClients();}

function renderStats(){
  const now=new Date(),t=clients.length,u=clients.filter(c=>new Date(c['Wedding Date'])>now).length,nd=clients.filter(c=>c['Gallery Delivered']!=='TRUE'&&c['Status']==='Confirmed').length;
  document.getElementById('stats').innerHTML='<div class="st"><div class="sn">'+t+'</div><div class="sl">Clients</div></div><div class="st"><div class="sn">'+u+'</div><div class="sl">Upcoming</div></div><div class="st"><div class="sn">'+nd+'</div><div class="sl">To deliver</div></div>';
}

function renderTasks(){
  const tasks=[],now=new Date();
  clients.forEach(function(c){
    var d=new Date(c['Wedding Date']),days=Math.ceil((d-now)/(864e5)),n=c['Groom Name']+' & '+c['Bride Name'];
    if(c['Contract Sent']!=='TRUE')tasks.push({cls:'urg',s:'!',t:'Send contract',sub:n,p:1});
    if(c['Contract Sent']==='TRUE'&&c['Contract Signed']!=='TRUE')tasks.push({cls:'urg',s:'!',t:'Awaiting signed contract',sub:n,p:2});
    if(days>0&&days<=30)tasks.push({cls:'nrm',s:'*',t:'Wedding in '+days+' days',sub:n+' - '+c['Wedding Date'],p:3});
    if(c['Gallery Delivered']!=='TRUE'&&d<now)tasks.push({cls:'urg',s:'!',t:'Gallery not delivered',sub:n,p:1});
  });
  tasks.sort(function(a,b){return a.p-b.p;});
  document.getElementById('tasks').innerHTML=tasks.length?tasks.map(function(t){return '<div class="ti"><div class="tib '+t.cls+'">'+t.s+'</div><div><div class="tt">'+t.t+'</div><div class="ts">'+t.sub+'</div></div></div>';}).join(''):'<div class="em">All caught up.</div>';
}

function renderClients(){
  var tbody=document.getElementById('rows');
  if(!clients.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:#aaa">No clients yet</td></tr>';return;}
  tbody.innerHTML=clients.map(function(c,i){
    var cb=c['Contract Signed']==='TRUE'?'<span class="badge bc">Signed</span>':c['Contract Sent']==='TRUE'?'<span class="badge bp">Sent</span>':'<span class="badge bt">Not sent</span>';
    var gb=c['Gallery Delivered']==='TRUE'?'<span class="badge bd">Delivered</span>':'<span class="badge bt">Pending</span>';
    return '<tr onclick="openD('+i+')"><td style="font-weight:500">'+c['Groom Name']+' &amp; '+c['Bride Name']+'</td><td>'+c['Wedding Date']+'</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c['Package']+'</td><td>'+cb+'</td><td>'+gb+'</td><td><span class="badge bt">'+c['Status']+'</span></td></tr>';
  }).join('');
}

function openD(i){
  var c=clients[i];
  document.getElementById('dname').textContent=c['Groom Name']+' & '+c['Bride Name'];
  var f=[['Wedding date',c['Wedding Date']],['Package',c['Package']],['Time',c['Start Time']+' - '+c['End Time']],['Prep',c['Venue Prep']],['Ceremony',c['Venue Ceremony']],['Reception',c['Venue Reception']],['Groom phone',c['Groom Phone']],['Bride phone',c['Bride Phone']],['Email',c['Groom Email']],['Add-ons',c['Add-ons']],['Notes',c['Notes']]];
  document.getElementById('dbody').innerHTML=f.filter(function(x){return x[1];}).map(function(x){return '<div class="dr"><span class="dl">'+x[0]+'</span><span class="dv">'+x[1]+'</span></div>';}).join('');
  var cks=[{k:'Contract Sent',l:'Contract sent'},{k:'Contract Signed',l:'Contract signed'},{k:'Deposit Paid',l:'Deposit paid'},{k:'Gallery Delivered',l:'Gallery delivered'}];
  document.getElementById('dchecks').innerHTML=cks.map(function(ck){
    var done=c[ck.k]==='TRUE';
    return '<div class="ci'+(done?' done':'')+'" onclick="toggle('+i+',''+ck.k+'')"><div class="cc'+(done?' tk':'')+'">'+( done?'&#10003;':'')+'</div><span>'+ck.l+'</span></div>';
  }).join('');
  document.getElementById('dmodal').classList.add('open');
}

async function toggle(idx,field){
  var c=clients[idx],v=c[field]==='TRUE'?'FALSE':'TRUE';
  c[field]=v;
  var hdrs=Object.keys(clients[0]).filter(function(k){return k!=='_row';});
  var col=hdrs.indexOf(field)+1;
  await fetch(API+'?action=update&row='+c._row+'&col='+col+'&value='+v);
  openD(idx);renderTasks();renderStats();
}

function closeD(){document.getElementById('dmodal').classList.remove('open');}

function renderCal(){
  var mo=['January','February','March','April','May','June','July','August','September','October','November','December'],dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('ctitle').textContent=mo[cM]+' '+cY;
  document.getElementById('cheads').innerHTML=dy.map(function(d){return '<div class="ch">'+d+'</div>';}).join('');
  var first=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate(),now=new Date(),em={};
  clients.forEach(function(c){if(!c['Wedding Date'])return;var d=new Date(c['Wedding Date']);if(d.getFullYear()===cY&&d.getMonth()===cM){var day=d.getDate();em[day]=(em[day]||[]).concat(c['Groom Name']+' & '+c['Bride Name']);}});
  var h='';
  for(var i=0;i<first;i++)h+='<div style="background:transparent;border:none"></div>';
  for(var d=1;d<=dim;d++){var isT=now.getDate()===d&&now.getMonth()===cM&&now.getFullYear()===cY,ev=em[d];h+='<div class="cd'+(ev?' he':'')+(isT?' td':'')+'"><div class="dn">'+d+'</div>'+(ev?ev.map(function(n){return '<div class="dot">'+n+'</div>';}).join(''):'')+'</div>';}
  document.getElementById('cdays').innerHTML=h;
}

function cm(d){cM+=d;if(cM>11){cM=0;cY++;}if(cM<0){cM=11;cY--;}renderCal();}

loadData();
</script></body></html>
